<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <meta name="description" content="Auralprint is a waveform analysis tool, designed for audio - offline-capable: no hosting required." />
  <meta name="keywords" content="auralprint, waveform analyzer, audio analyzer, audio visualizer, analysis, audio, generative art, web audio, canvas, single file" />

  <style>
    :root {
      --ui-panel-bg: rgba(0,0,0,0.72);
      --ui-panel-blur: 6px;
      --ui-pad: 10px;
      --ui-gap: 10px;
      --ui-radius: 10px;
      --ui-font: system-ui, sans-serif;

      --ui-audio-h: 64px;
      --ui-icon: 40px;

      --ui-safe-b: env(safe-area-inset-bottom, 0px);
      --ui-safe-r: env(safe-area-inset-right, 0px);
      --ui-safe-l: env(safe-area-inset-left, 0px);
      --ui-safe-t: env(safe-area-inset-top, 0px);
    }

    html, body {
      margin: 0;
      height: 100%;
      background: #000;
      color: #fff;
      font-family: var(--ui-font);
      overflow: hidden;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
    }

    .panel {
      background: var(--ui-panel-bg);
      backdrop-filter: blur(var(--ui-panel-blur));
      border-radius: var(--ui-radius);
      box-sizing: border-box;
    }

    button, select { cursor: pointer; font: inherit; }
    input[type="range"] { width: 260px; }

    .muted {
      opacity: 0.85;
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .sectionTitle { margin: 10px 0 6px; font-size: 12px; opacity: 0.75; }

    .row {
      display: grid;
      grid-template-columns: 160px 1fr 140px;
      gap: 10px;
      align-items: center;
      margin: 6px 0;
    }

    .val {
      font-variant-numeric: tabular-nums;
      font-size: 12px;
      opacity: 0.85;
      justify-self: end;
    }

    /* Bottom audio panel */
    #audioPanel {
      position: fixed;
      left: calc(var(--ui-pad) + var(--ui-safe-l));
      right: calc(var(--ui-pad) + var(--ui-safe-r));
      bottom: calc(var(--ui-pad) + var(--ui-safe-b));
      height: var(--ui-audio-h);
      padding: var(--ui-pad);
      display: grid;
      grid-template-columns: auto auto auto auto auto 1fr auto;
      gap: var(--ui-gap);
      align-items: center;
      z-index: 20;
    }

    #audioPanel .track { min-width: 0; }

    /* Sim config panel (left) */
    #simPanel {
      position: fixed;
      top: calc(var(--ui-pad) + var(--ui-safe-t));
      left: calc(var(--ui-pad) + var(--ui-safe-l));
      bottom: calc(var(--ui-pad) + var(--ui-safe-b) + var(--ui-audio-h) + var(--ui-gap));
      width: min(460px, calc(100vw - 2 * var(--ui-pad)));
      padding: var(--ui-pad);
      overflow: auto;
      z-index: 30;
    }

    /* Bands + colors panel (right) */
    #bandsPanel {
      position: fixed;
      top: calc(var(--ui-pad) + var(--ui-safe-t));
      right: calc(var(--ui-pad) + var(--ui-safe-r));
      bottom: calc(var(--ui-pad) + var(--ui-safe-b) + var(--ui-audio-h) + var(--ui-gap));
      width: min(520px, calc(100vw - 2 * var(--ui-pad)));
      padding: var(--ui-pad);
      overflow: auto;
      z-index: 30;
    }

    /* Launchers shown when panels are hidden */
    .launcher {
      position: fixed;
      width: var(--ui-icon);
      height: var(--ui-icon);
      border-radius: 999px;
      display: grid;
      place-items: center;
      z-index: 40;
      user-select: none;
    }

    #openAudio { left: calc(var(--ui-pad) + var(--ui-safe-l)); bottom: calc(var(--ui-pad) + var(--ui-safe-b)); }
    #openSim { left: calc(var(--ui-pad) + var(--ui-safe-l)); top: calc(var(--ui-pad) + var(--ui-safe-t)); }
    #openBands { right: calc(var(--ui-pad) + var(--ui-safe-r)); top: calc(var(--ui-pad) + var(--ui-safe-t)); }

    .launcher button {
      width: 100%;
      height: 100%;
      border-radius: 999px;
      background: var(--ui-panel-bg);
      backdrop-filter: blur(var(--ui-panel-blur));
      border: none;
      color: #fff;
      font-size: 18px;
    }

    /* Debug hint */
    #hint {
      position: fixed;
      left: calc(var(--ui-pad) + var(--ui-safe-l));
      top: calc(var(--ui-pad) + var(--ui-safe-t));
      z-index: 50;
      font-size: 12px;
      opacity: 0.60;
      pointer-events: none;
    }

    input[type="color"] {
      width: 44px;
      height: 26px;
      padding: 0;
      border: none;
      background: transparent;
      cursor: pointer;
    }

    /* Bands HUD */
    #bandTable {
      display: grid;
      grid-template-columns: 40px 1fr 160px;
      gap: 8px 10px;
      align-items: center;
      margin-top: 8px;
    }

    .bandIdx { font-size: 12px; opacity: 0.75; text-align: right; }
    .bandName { font-size: 12px; opacity: 0.90; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .bandBar {
      height: 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.10);
      overflow: hidden;
      position: relative;
    }
    .bandFill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
    }
    .bandMeta {
      grid-column: 1 / -1;
      font-size: 11px;
      opacity: 0.65;
      margin: 6px 0 2px;
    }
    .dominantBadge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.12);
      font-size: 12px;
      opacity: 0.9;
    }

    /* Responsive: on narrow viewports, don’t force two big side panels */
    @media (max-width: 980px) {
      #bandsPanel { width: min(520px, calc(100vw - 2 * var(--ui-pad))); left: calc(var(--ui-pad) + var(--ui-safe-l)); right: auto; }
      #simPanel { width: min(520px, calc(100vw - 2 * var(--ui-pad))); }
    }
  </style>
</head>

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function lerp(a, b, t) { return a + (b - a) * t; }
function fmt(n, d) { return Number(n).toFixed(d); }

function deepFreeze(obj) {
  Object.freeze(obj);
  for (const k of Object.keys(obj)) {
    const v = obj[k];
    if (v && typeof v === "object" && !Object.isFrozen(v)) deepFreeze(v);
  }
  return obj;
}

function deepClone(obj) {
  if (typeof structuredClone === "function") return structuredClone(obj);
  return JSON.parse(JSON.stringify(obj));
}

function hexToRgb01(hex) {
  const h = hex.replace("#", "");
  return {
    r: parseInt(h.slice(0, 2), 16) / 255,
    g: parseInt(h.slice(2, 4), 16) / 255,
    b: parseInt(h.slice(4, 6), 16) / 255,
  };
}

function rgb01ToCss({r,g,b}, alpha = 1) {
  const R = Math.round(clamp(r,0,1) * 255);
  const G = Math.round(clamp(g,0,1) * 255);
  const B = Math.round(clamp(b,0,1) * 255);
  return `rgba(${R},${G},${B},${clamp(alpha,0,1)})`;
}

function lerpRgb01(a, b, t) {
  return { r: lerp(a.r, b.r, t), g: lerp(a.g, b.g, t), b: lerp(a.b, b.b, t) };
}

function dot(a, b, stride = 1) {
  let s = 0;
  const n = Math.min(a.length, b.length);
  for (let i = 0; i < n; i += stride) s += a[i] * b[i];
  return s;
}

function hsvToRgb01(hDeg, s, v) {
  const h = ((hDeg % 360) + 360) % 360;
  const c = v * s;
  const x = c * (1 - Math.abs(((h / 60) % 2) - 1));
  const m = v - c;

  let rp=0, gp=0, bp=0;
  if (h < 60) { rp = c; gp = x; bp = 0; }
  else if (h < 120) { rp = x; gp = c; bp = 0; }
  else if (h < 180) { rp = 0; gp = c; bp = x; }
  else if (h < 240) { rp = 0; gp = x; bp = c; }
  else if (h < 300) { rp = x; gp = 0; bp = c; }
  else { rp = c; gp = 0; bp = x; }

  return { r: rp + m, g: gp + m, b: bp + m };
}

/* =============================================================================
   Preferences + Runtime settings (derived)
   ========================================================================== */
let preferences = deepClone(CONFIG.defaults);
const runtime = { settings: deepClone(CONFIG.defaults) };

const BAND_NAMES = CONFIG.bandNames;
const BAND_NAME_TO_INDEX = new Map(BAND_NAMES.map((name, index) => [name, index]));

function resolveSettings() { runtime.settings = deepClone(preferences); }


function normalizeOrbChannelId(rawChanId, rawLegacyBandId) {
  const candidate = typeof rawChanId === "string"
    ? rawChanId
    : (typeof rawLegacyBandId === "string" ? rawLegacyBandId : "");
  const up = candidate.toUpperCase();
  return ["L", "R", "C"].includes(up) ? up : "C";
}

function sanitizeOrbBandIds(rawBandIds, rawBandNames) {
  const bandCount = BAND_NAMES.length;

  if (Array.isArray(rawBandIds)) {
    const out = [];
    const seen = new Set();
    for (const v of rawBandIds) {
      const n = Number(v);
      if (!Number.isInteger(n)) continue;
      if (n < 0 || n >= bandCount) continue;
      if (seen.has(n)) continue;
      seen.add(n);
      out.push(n);
    }
    return out;
  }

  if (Array.isArray(rawBandNames) && bandCount) {
    const out = [];
    const seen = new Set();
    for (const bandName of rawBandNames) {
      if (typeof bandName !== "string") continue;
      const idx = BAND_NAME_TO_INDEX.get(bandName);
      if (!Number.isInteger(idx) || seen.has(idx)) continue;
      seen.add(idx);
      out.push(idx);
    }
    return out;
  }

  return [];
}

function normalizeOrbDef(incomingOrb, fallbackOrb) {
  const fallback = fallbackOrb || {};
  const orb = (incomingOrb && typeof incomingOrb === "object") ? incomingOrb : {};

  const id = typeof orb.id === "string" && orb.id.trim()
    ? orb.id
    : (typeof fallback.id === "string" ? fallback.id : "ORB");

  const chiralityRaw = Number.isFinite(orb.chirality) ? orb.chirality : fallback.chirality;
  const chirality = chiralityRaw >= 0 ? 1 : -1;

  const startAngleRad = Number.isFinite(orb.startAngleRad)
    ? orb.startAngleRad
    : (Number.isFinite(fallback.startAngleRad) ? fallback.startAngleRad : 0);

  const chanId = normalizeOrbChannelId(orb.chanId, orb.bandId);
  const bandIds = sanitizeOrbBandIds(orb.bandIds, orb.bandNames);

  return { id, chanId, bandIds, chirality, startAngleRad };
}

/* =============================================================================
   Sim space vs Screen space
   ========================================================================== */
const Spaces = (() => {
  function centerPx() {
    return { x: state.widthPx * 0.5, y: state.heightPx * 0.5 };
  }
  function simToScreen(xSim, ySim) {
    const c = centerPx();
    return { x: c.x + xSim, y: c.y - ySim };
  }
  return { centerPx, simToScreen };
})();

/* =============================================================================
   Canvas sizing
   ========================================================================== */
function resizeCanvasToDisplaySize() {
  const dpr = window.devicePixelRatio || 1;
  const cssW = state.canvas.clientWidth;
  const cssH = state.canvas.clientHeight;

  const pxW = Math.floor(cssW * dpr);
  const pxH = Math.floor(cssH * dpr);

  if (pxW !== state.widthPx || pxH !== state.heightPx || dpr !== state.dpr) {
    state.dpr = dpr;
    state.widthPx = pxW;
    state.heightPx = pxH;
    state.canvas.width = pxW;
    state.canvas.height = pxH;
  }
}

/* =============================================================================
   URL Presets (v2/v3/v4/v5 compatible)
   ========================================================================== */
const UrlPreset = (() => {
  function base64UrlEncode(bytes) {
    let b64 = btoa(String.fromCharCode(...bytes));
    return b64.replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
  }

  function base64UrlDecodeToBytes(b64url) {
    const b64 = b64url.replace(/-/g, "+").replace(/_/g, "/") + "===".slice((b64url.length + 3) % 4);
    const bin = atob(b64);
    const out = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
    return out;
  }

  function encodePrefsToHash(prefs) {
    const payload = { schema: PRESET_SCHEMA_VERSION, prefs };
    const json = JSON.stringify(payload);
    const bytes = new TextEncoder().encode(json);
    return "#p=" + base64UrlEncode(bytes);
  }

  function decodePrefsFromHash(hash) {
    if (!hash || !hash.startsWith("#p=")) return null;
    const token = hash.slice(3);
    const bytes = base64UrlDecodeToBytes(token);
    const json = new TextDecoder().decode(bytes);
    const obj = JSON.parse(json);
    if (!obj || !obj.prefs) return null;

    if (![PRESET_SCHEMA_VERSION, LEGACY_SCHEMA_V4, LEGACY_SCHEMA_V3, LEGACY_SCHEMA_V2].includes(obj.schema)) return null;
    return obj.prefs;
  }

  function sanitizeAndApply(incoming) {
    const next = deepClone(preferences);

    if (incoming.visuals) {
      if (typeof incoming.visuals.backgroundColor === "string") next.visuals.backgroundColor = incoming.visuals.backgroundColor;
      if (typeof incoming.visuals.particleColor === "string") next.visuals.particleColor = incoming.visuals.particleColor;
    }

    if (incoming.trace) {
      if (typeof incoming.trace.lines === "boolean") next.trace.lines = incoming.trace.lines;
      if (Number.isFinite(incoming.trace.numLines)) {
        const lim = CONFIG.limits.trace.numLines;
        next.trace.numLines = clamp(incoming.trace.numLines, lim.min, lim.max);
      }
      if (typeof incoming.trace.lineColorMode === "string") {
        if (["fixed","lastParticle","dominantBand"].includes(incoming.trace.lineColorMode)) {
          next.trace.lineColorMode = incoming.trace.lineColorMode;
        }
      }
    }

    if (incoming.particles) {
      for (const k of ["emitPerSecond","sizeMaxPx","sizeMinPx","sizeToMinSec","ttlSec","overlapRadiusPx"]) {
        if (Number.isFinite(incoming.particles[k])) {
          const lim = CONFIG.limits.particles[k];
          next.particles[k] = clamp(incoming.particles[k], lim.min, lim.max);
        }
      }
    }

    if (incoming.motion) {
      if (Number.isFinite(incoming.motion.angularSpeedRadPerSec)) {
        const lim = CONFIG.limits.motion.angularSpeedRadPerSec;
        next.motion.angularSpeedRadPerSec = clamp(incoming.motion.angularSpeedRadPerSec, lim.min, lim.max);
      }
      if (Number.isFinite(incoming.motion.waveformRadialDisplaceFrac)) {
        const lim = CONFIG.limits.motion.waveformRadialDisplaceFrac;
        next.motion.waveformRadialDisplaceFrac = clamp(incoming.motion.waveformRadialDisplaceFrac, lim.min, lim.max);
      }
    }

    if (incoming.audio) {
      if (Number.isFinite(incoming.audio.rmsGain)) {
        const lim = CONFIG.limits.audio.rmsGain;
        next.audio.rmsGain = clamp(incoming.audio.rmsGain, lim.min, lim.max);
      }
      if (Number.isFinite(incoming.audio.minRadiusFrac)) {
        const lim = CONFIG.limits.audio.minRadiusFrac;
        next.audio.minRadiusFrac = clamp(incoming.audio.minRadiusFrac, lim.min, lim.max);
      }
      if (Number.isFinite(incoming.audio.maxRadiusFrac)) {
        const lim = CONFIG.limits.audio.maxRadiusFrac;
        next.audio.maxRadiusFrac = clamp(incoming.audio.maxRadiusFrac, lim.min, lim.max);
      }
      if (Number.isFinite(incoming.audio.smoothingTimeConstant)) {
        const lim = CONFIG.limits.audio.smoothingTimeConstant;
        next.audio.smoothingTimeConstant = clamp(incoming.audio.smoothingTimeConstant, lim.min, lim.max);
      }
      if (Number.isFinite(incoming.audio.fftSize) && CONFIG.limits.audio.fftSizes.includes(incoming.audio.fftSize)) {
        next.audio.fftSize = incoming.audio.fftSize;
      }

      if (typeof incoming.audio.loop === "boolean") next.audio.loop = incoming.audio.loop;
      if (typeof incoming.audio.muted === "boolean") next.audio.muted = incoming.audio.muted;
      if (Number.isFinite(incoming.audio.volume)) {
        next.audio.volume = clamp(incoming.audio.volume, CONFIG.ui.volume.min, CONFIG.ui.volume.max);
      }
    }

    if (incoming.bands) {
      if (incoming.bands.overlay) {
        if (typeof incoming.bands.overlay.enabled === "boolean") next.bands.overlay.enabled = incoming.bands.overlay.enabled;
        if (typeof incoming.bands.overlay.connectAdjacent === "boolean") next.bands.overlay.connectAdjacent = incoming.bands.overlay.connectAdjacent;

        if (Number.isFinite(incoming.bands.overlay.alpha)) {
          const lim = CONFIG.limits.bands.overlayAlpha;
          next.bands.overlay.alpha = clamp(incoming.bands.overlay.alpha, lim.min, lim.max);
        }
        if (Number.isFinite(incoming.bands.overlay.pointSizePx)) {
          const lim = CONFIG.limits.bands.pointSizePx;
          next.bands.overlay.pointSizePx = clamp(incoming.bands.overlay.pointSizePx, lim.min, lim.max);
        }

        if (typeof incoming.bands.overlay.phaseMode === "string") {
          if (["orb","free"].includes(incoming.bands.overlay.phaseMode)) {
            next.bands.overlay.phaseMode = incoming.bands.overlay.phaseMode;
          }
        }
        if (Number.isFinite(incoming.bands.overlay.ringSpeedRadPerSec)) {
          const lim = CONFIG.limits.bands.ringSpeedRadPerSec;
          next.bands.overlay.ringSpeedRadPerSec = clamp(incoming.bands.overlay.ringSpeedRadPerSec, lim.min, lim.max);
        }
      }

      if (incoming.bands.rainbow) {
        if (Number.isFinite(incoming.bands.rainbow.hueOffsetDeg)) {
          const lim = CONFIG.limits.bands.hueOffsetDeg;
          next.bands.rainbow.hueOffsetDeg = clamp(incoming.bands.rainbow.hueOffsetDeg, lim.min, lim.max);
        }
        if (Number.isFinite(incoming.bands.rainbow.saturation)) {
          const lim = CONFIG.limits.bands.saturation;
          next.bands.rainbow.saturation = clamp(incoming.bands.rainbow.saturation, lim.min, lim.max);
        }
        if (Number.isFinite(incoming.bands.rainbow.value)) {
          const lim = CONFIG.limits.bands.value;
          next.bands.rainbow.value = clamp(incoming.bands.rainbow.value, lim.min, lim.max);
        }
      }

      if (typeof incoming.bands.particleColorSource === "string") {
        if (["fixed","dominant","angle"].includes(incoming.bands.particleColorSource)) {
          next.bands.particleColorSource = incoming.bands.particleColorSource;
        }
      }
    }


    if (Array.isArray(incoming.orbs)) {
      const defaults = CONFIG.defaults.orbs;
      next.orbs = incoming.orbs.map((orb, i) => {
        const mappedOrb = (orb && typeof orb === "object") ? deepClone(orb) : orb;
        if (mappedOrb && !Array.isArray(mappedOrb.bandIds) && Array.isArray(mappedOrb.bandNames)) {
          mappedOrb.bandIds = sanitizeOrbBandIds(undefined, mappedOrb.bandNames);
        }
        if (mappedOrb && typeof mappedOrb === "object") delete mappedOrb.bandNames;
        return normalizeOrbDef(mappedOrb, defaults[i % defaults.length]);
      });
    }

    if (next.bands && typeof next.bands === "object") delete next.bands.names;

    next.particles.sizeMinPx = Math.min(next.particles.sizeMinPx, next.particles.sizeMaxPx);
    next.particles.ttlSec = Math.max(next.particles.ttlSec, next.particles.sizeToMinSec);

    preferences = next;
    resolveSettings();
    return true;
  }

  function applyFromLocationHash() {
    try {
      const decoded = decodePrefsFromHash(location.hash);
      if (!decoded) return false;
      return sanitizeAndApply(decoded);
    } catch {
      return false;
    }
  }

  function writeHashFromPrefs() {
    const encodedPrefs = deepClone(preferences);
    if (encodedPrefs.bands && typeof encodedPrefs.bands === "object") delete encodedPrefs.bands.names;
    if (Array.isArray(encodedPrefs.orbs)) {
      for (const orb of encodedPrefs.orbs) {
        if (orb && typeof orb === "object") delete orb.bandNames;
      }
    }

    const hash = encodePrefsToHash(encodedPrefs);
    history.replaceState(null, "", location.pathname + location.search + hash);
  }

  return { applyFromLocationHash, writeHashFromPrefs };
})();

/* =============================================================================
   BandBank — defines 256 bands and maps FFT bins -> band energies
   ========================================================================== */
const BandBankController = (() => {
  const bandConfig = {
    count: CONFIG.defaults.bands.count,
    floorHz: CONFIG.defaults.bands.floorHz,
    configCeilingHz: CONFIG.defaults.bands.ceilingHz,
    logSpacing: !!CONFIG.defaults.bands.logSpacing,
  };

  let sampleRateHz = null;

  function readBandDefKey(sourceSettings) {
    const s = sourceSettings || runtime.settings;
    return [s.bands.count, s.bands.floorHz, s.bands.ceilingHz, s.bands.logSpacing ? 1 : 0].join("|");
  }

  function syncFromSettings(sourceSettings) {
    const s = sourceSettings || runtime.settings;
    bandConfig.count = s.bands.count;
    bandConfig.floorHz = s.bands.floorHz;
    bandConfig.configCeilingHz = s.bands.ceilingHz;
    bandConfig.logSpacing = !!s.bands.logSpacing;
  }

  function getNyquistHz() {
    return Number.isFinite(sampleRateHz) ? sampleRateHz * 0.5 : null;
  }

  function getEffectiveCeilingHz() {
    const nyquistHz = getNyquistHz();
    return Number.isFinite(nyquistHz)
      ? Math.min(bandConfig.configCeilingHz, nyquistHz)
      : bandConfig.configCeilingHz;
  }

  function onAudioContextKnown(nextSampleRateHz) {
    const wasKnown = Number.isFinite(sampleRateHz);
    const prevEffective = getEffectiveCeilingHz();

    sampleRateHz = Number.isFinite(nextSampleRateHz) ? nextSampleRateHz : null;

    const nextEffective = getEffectiveCeilingHz();
    const becameKnown = !wasKnown && Number.isFinite(sampleRateHz);
    const effectiveChanged = nextEffective !== prevEffective;

    return becameKnown || effectiveChanged;
  }

  function rebuildNow() {
    BandBank.rebuild(getEffectiveCeilingHz(), sampleRateHz);
  }

  return {
    syncFromSettings,
    readBandDefKey,
    onAudioContextKnown,
    rebuildNow,
  };
})();

const BandBank = (() => {
  function rebuild(effectiveCeilingHz, sampleRateHz = null) {
    const s = runtime.settings;
    const n = s.bands.count;
    const f0 = s.bands.floorHz;
    const configCeilingHz = s.bands.ceilingHz;
    const f1 = Math.max(f0, Number.isFinite(effectiveCeilingHz) ? effectiveCeilingHz : configCeilingHz);

    state.bands.lowHz = new Array(n);
    state.bands.highHz = new Array(n);

    state.bands.lowHz[0] = 0;
    state.bands.highHz[0] = f0;

    const interiorBands = n - 2;
    const ratio = s.bands.logSpacing
      ? Math.pow(f1 / f0, 1 / interiorBands)
      : null;

    for (let i = 0; i < interiorBands; i++) {
      const idx = 1 + i;
      if (s.bands.logSpacing) {
        const lo = f0 * Math.pow(ratio, i);
        const hi = f0 * Math.pow(ratio, i + 1);
        state.bands.lowHz[idx] = lo;
        state.bands.highHz[idx] = hi;
      } else {
        const lo = lerp(f0, f1, i / interiorBands);
        const hi = lerp(f0, f1, (i + 1) / interiorBands);
        state.bands.lowHz[idx] = lo;
        state.bands.highHz[idx] = hi;
      }
    }

    state.bands.lowHz[n - 1] = f1;
    state.bands.highHz[n - 1] = Infinity;

    state.bands.energies01 = new Array(n).fill(0);
    state.bands.meta.sampleRateHz = Number.isFinite(sampleRateHz) ? sampleRateHz : null;
    state.bands.meta.nyquistHz = Number.isFinite(sampleRateHz) ? sampleRateHz * 0.5 : null;
    state.bands.meta.configCeilingHz = configCeilingHz;
    state.bands.meta.effectiveCeilingHz = f1;
  }

  function bandIndexFromAngleRad(angleRad) {
    const n = runtime.settings.bands.count;
    const a01 = ((angleRad % TAU) + TAU) % TAU / TAU;
    let idx = Math.floor(a01 * n);
    idx = clamp(idx, 0, n - 1);
    return idx;
  }

  function computeEnergiesFromCAnalyser(cBand, audioContextSampleRate) {
    const s = runtime.settings;
    const n = s.bands.count;
    if (!cBand || !cBand.freqDb) return;

    const nyquist = audioContextSampleRate * 0.5;
    const bins = cBand.freqDb.length;

    const minDb = cBand.analyser.minDecibels;
    const maxDb = cBand.analyser.maxDecibels;
    const dbSpan = Math.max(1e-6, (maxDb - minDb));

    let dominant = 0;
    let dominantVal = -1;

    for (let i = 0; i < n; i++) {
      const loHz = state.bands.lowHz[i];
      const hiHzRaw = state.bands.highHz[i];
      const hiHz = Math.min(nyquist, (hiHzRaw === Infinity ? nyquist : hiHzRaw));

      const loBin = Math.floor((loHz / nyquist) * (bins - 1));
      const hiBin = Math.ceil((hiHz / nyquist) * (bins - 1));

      const a = clamp(loBin, 0, bins - 1);
      const b = clamp(hiBin, 0, bins - 1);

      if (b < a) {
        state.bands.energies01[i] = 0;
        continue;
      }

      let sum = 0;
      let count = 0;
      for (let k = a; k <= b; k++) {
        const t = clamp((cBand.freqDb[k] - minDb) / dbSpan, 0, 1);
        sum += t;
        count += 1;
      }

      const avg = count > 0 ? (sum / count) : 0;
      state.bands.energies01[i] = avg;

      if (avg > dominantVal) {
        dominantVal = avg;
        dominant = i;
      }
    }

    state.bands.dominantIndex = dominant;
    const name = BAND_NAMES[dominant] || `Band ${dominant}`;
    state.bands.dominantName = name;

    const lo = state.bands.lowHz[dominant];
    const hi = state.bands.highHz[dominant];
    state.bands.dominantHz = `${fmt(lo, 0)}–${hi === Infinity ? "∞" : fmt(hi, 0)} Hz`;
  }

  return { rebuild, bandIndexFromAngleRad, computeEnergiesFromCAnalyser };
})();

/* =============================================================================
   ColorPolicy
   ========================================================================== */
const ColorPolicy = (() => {
  function bandRgb01(index) {
    const s = runtime.settings;
    const n = s.bands.count;
    const hueStep = 360 / n;
    const hue = s.bands.rainbow.hueOffsetDeg + index * hueStep;
    return hsvToRgb01(hue, s.bands.rainbow.saturation, s.bands.rainbow.value);
  }

  function pickParticleColorRgb01(angleRad) {
    const s = runtime.settings;

    if (s.bands.particleColorSource === "fixed") return hexToRgb01(s.visuals.particleColor);
    if (s.bands.particleColorSource === "angle") return bandRgb01(BandBank.bandIndexFromAngleRad(angleRad));

    return bandRgb01(state.bands.dominantIndex); // dominant
  }

  function pickLineColorRgb01(particles) {
    const s = runtime.settings;
    if (s.trace.lineColorMode === "dominantBand") return bandRgb01(state.bands.dominantIndex);

    if (s.trace.lineColorMode === "lastParticle") {
      const last = particles && particles.length ? particles[particles.length - 1] : null;
      if (last && last.rgbStart) return last.rgbStart;
      return hexToRgb01(s.visuals.particleColor);
    }

    return hexToRgb01(s.visuals.particleColor); // fixed
  }

  return { bandRgb01, pickParticleColorRgb01, pickLineColorRgb01 };
})();

/* =============================================================================
   Audio Engine (L/R/C) + freq data for C
   ========================================================================== */
const AudioEngine = (() => {
  let audioContext = null;

  let mediaEl = null;
  let sourceNode = null;
  let outputGain = null;

  let splitter = null;
  let sumNode = null;
  let sumGainL = null;
  let sumGainR = null;

  const bands = new Map();
  const status = {
    ready: false,
    monoLike: true,
    rmsL: 0, rmsR: 0, corrLR: 0,
  };

  function ensureContext() {
    if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
    if (BandBankController.onAudioContextKnown(audioContext.sampleRate)) {
      BandBankController.rebuildNow();
    }
    return audioContext;
  }

  function teardown() {
    try { if (sourceNode) sourceNode.disconnect(); } catch {}
    try { if (splitter) splitter.disconnect(); } catch {}
    try { if (sumNode) sumNode.disconnect(); } catch {}
    try { if (outputGain) outputGain.disconnect(); } catch {}

    bands.clear();
    sourceNode = null;
    splitter = null;
    sumNode = null;
    sumGainL = null;
    sumGainR = null;
    outputGain = null;

    mediaEl = null;

    status.ready = false;
    status.monoLike = true;
    status.rmsL = 0;
    status.rmsR = 0;
    status.corrLR = 0;
  }

  function makeAnalyserBand(id, label) {
    const ctx = ensureContext();
    const a = ctx.createAnalyser();
    a.fftSize = runtime.settings.audio.fftSize;
    a.smoothingTimeConstant = runtime.settings.audio.smoothingTimeConstant;

    const timeDomain = new Float32Array(a.fftSize);
    const freqDb = new Float32Array(a.frequencyBinCount);

    return { id, label, analyser: a, timeDomain, freqDb, rms: 0, energy01: 0 };
  }

  function applyPlaybackSettingsLive() {
    if (!outputGain || !mediaEl) return;
    const s = runtime.settings;
    mediaEl.loop = !!s.audio.loop;
    outputGain.gain.value = s.audio.muted ? 0 : s.audio.volume;
  }

  function applyAnalyserSettingsLive() {
    for (const band of bands.values()) {
      band.analyser.smoothingTimeConstant = runtime.settings.audio.smoothingTimeConstant;
      if (band.analyser.fftSize !== runtime.settings.audio.fftSize) {
        band.analyser.fftSize = runtime.settings.audio.fftSize;
        band.timeDomain = new Float32Array(band.analyser.fftSize);
        band.freqDb = new Float32Array(band.analyser.frequencyBinCount);
      }
    }
  }

  function buildGraph() {
    const ctx = ensureContext();

    outputGain = ctx.createGain();
    splitter = ctx.createChannelSplitter(2);

    sumNode = ctx.createGain();
    sumGainL = ctx.createGain();
    sumGainR = ctx.createGain();
    sumGainL.gain.value = 0.5;
    sumGainR.gain.value = 0.5;

    const bandL = makeAnalyserBand("L", "Left");
    const bandR = makeAnalyserBand("R", "Right");
    const bandC = makeAnalyserBand("C", "Center");

    bands.set("L", bandL);
    bands.set("R", bandR);
    bands.set("C", bandC);

    sourceNode.connect(splitter);

    splitter.connect(bandL.analyser, 0);
    splitter.connect(bandR.analyser, 1);

    splitter.connect(sumGainL, 0);
    splitter.connect(sumGainR, 1);
    sumGainL.connect(sumNode);
    sumGainR.connect(sumNode);
    sumNode.connect(bandC.analyser);

    sourceNode.connect(outputGain);
    outputGain.connect(ctx.destination);

    applyPlaybackSettingsLive();
    applyAnalyserSettingsLive();

    status.ready = true;
  }

  async function loadFile(file) {
    const ctx = ensureContext();
    if (ctx.state === "suspended") await ctx.resume();

    teardown();

    mediaEl = document.createElement("audio");
    mediaEl.preload = "auto";

    const url = URL.createObjectURL(file);
    mediaEl.src = url;

    sourceNode = ctx.createMediaElementSource(mediaEl);
    buildGraph();

    state.audio.isLoaded = true;
    state.audio.filename = file.name;

    await mediaEl.play().catch(() => {});
    state.audio.isPlaying = !mediaEl.paused;

    mediaEl.addEventListener("loadeddata", () => {
      try { URL.revokeObjectURL(url); } catch {}
    }, { once: true });

    return true;
  }

  async function playPause() {
    if (!mediaEl) return;
    const ctx = ensureContext();
    if (ctx.state === "suspended") await ctx.resume();

    if (mediaEl.paused) await mediaEl.play().catch(() => {});
    else mediaEl.pause();

    state.audio.isPlaying = !mediaEl.paused;
  }

  function stop() {
    if (!mediaEl) return;
    mediaEl.pause();
    try { mediaEl.currentTime = 0; } catch {}
    state.audio.isPlaying = false;
  }

  function computeRmsFromWaveform(wf) {
    let sumSq = 0;
    for (let i = 0; i < wf.length; i++) {
      const v = wf[i];
      sumSq += v * v;
    }
    return Math.sqrt(sumSq / Math.max(1, wf.length));
  }

  function computeEnergy01(rms) {
    const g = runtime.settings.audio.rmsGain;
    return clamp(rms * g, 0, 1);
  }

  function updateMonoDetection(bandL, bandR) {
    const silenceThresh = CONFIG.limits.monoDetect.rightSilenceRms;
    const stride = CONFIG.limits.monoDetect.lrCorrelationStride;
    const corrThresh = CONFIG.limits.monoDetect.lrCorrelationMonoThresh;

    const rmsL = bandL.rms;
    const rmsR = bandR.rms;

    status.rmsL = rmsL;
    status.rmsR = rmsR;

    if (rmsR < silenceThresh) {
      status.corrLR = 0;
      status.monoLike = true;
      return;
    }

    const L = bandL.timeDomain;
    const R = bandR.timeDomain;

    const dLR = dot(L, R, stride);
    const dLL = dot(L, L, stride);
    const dRR = dot(R, R, stride);

    const denom = Math.sqrt(Math.max(1e-12, dLL * dRR));
    const corr = dLR / denom;

    status.corrLR = corr;
    status.monoLike = corr >= corrThresh;
  }

  function adjustCenterMixing() {
    if (!sumGainL || !sumGainR) return;
    const rSilent = status.rmsR < CONFIG.limits.monoDetect.rightSilenceRms;
    if (rSilent) {
      sumGainL.gain.value = 1.0;
      sumGainR.gain.value = 0.0;
    } else {
      sumGainL.gain.value = 0.5;
      sumGainR.gain.value = 0.5;
    }
  }

  function sample() {
    if (!status.ready) return { ready: false, monoLike: true };

    const bandL = bands.get("L");
    const bandR = bands.get("R");
    const bandC = bands.get("C");

    bandL.analyser.getFloatTimeDomainData(bandL.timeDomain);
    bandR.analyser.getFloatTimeDomainData(bandR.timeDomain);

    bandL.rms = computeRmsFromWaveform(bandL.timeDomain);
    bandR.rms = computeRmsFromWaveform(bandR.timeDomain);

    updateMonoDetection(bandL, bandR);
    adjustCenterMixing();

    bandC.analyser.getFloatTimeDomainData(bandC.timeDomain);
    bandC.rms = computeRmsFromWaveform(bandC.timeDomain);

    bandL.energy01 = computeEnergy01(bandL.rms);
    bandR.energy01 = computeEnergy01(bandR.rms);
    bandC.energy01 = computeEnergy01(bandC.rms);

    bandC.analyser.getFloatFrequencyData(bandC.freqDb);
    BandBank.computeEnergiesFromCAnalyser(bandC, ensureContext().sampleRate);

    return { ready: true, monoLike: status.monoLike, bands: { L: bandL, R: bandR, C: bandC }, debug: { corrLR: status.corrLR } };
  }

  return { loadFile, playPause, stop, sample, applyPlaybackSettingsLive, applyAnalyserSettingsLive };
})();

/* =============================================================================
   TrailSystem
   ========================================================================== */
class TrailSystem {
  constructor() {
    this.particles = []; // { xSim, ySim, bornSec, rgbStart }
    this.emitAccumulator = 0;
  }

  reset() {
    this.particles.length = 0;
    this.emitAccumulator = 0;
  }

  removeOverlaps(xSim, ySim, rPx) {
    if (rPx <= 0) return;
    const r2 = rPx * rPx;
    for (let i = this.particles.length - 1; i >= 0; i--) {
      const p = this.particles[i];
      const dx = p.xSim - xSim;
      const dy = p.ySim - ySim;
      if ((dx*dx + dy*dy) <= r2) this.particles.splice(i, 1);
    }
  }

  emitAt(xSim, ySim, nowSec, rgbStart) {
    const s = runtime.settings;
    this.removeOverlaps(xSim, ySim, s.particles.overlapRadiusPx * state.dpr);
    this.particles.push({ xSim, ySim, bornSec: nowSec, rgbStart });
  }

  updateAndEmit(dtSec, nowSec, emitterXSim, emitterYSim, rgbStart) {
    const s = runtime.settings;

    const ttl = Math.max(0.0001, s.particles.ttlSec);
    for (let i = this.particles.length - 1; i >= 0; i--) {
      if ((nowSec - this.particles[i].bornSec) >= ttl) this.particles.splice(i, 1);
    }

    this.emitAccumulator += s.particles.emitPerSecond * dtSec;

    const maxEmitThisFrame = Math.ceil(s.particles.emitPerSecond * s.timing.maxDeltaTimeSec) + 2;

    let emits = 0;
    while (this.emitAccumulator >= 1 && emits < maxEmitThisFrame) {
      this.emitAt(emitterXSim, emitterYSim, nowSec, rgbStart);
      this.emitAccumulator -= 1;
      emits += 1;
    }
  }
}

/* =============================================================================
   Orb
   ========================================================================== */
class Orb {
  constructor(def) {
    this.id = def.id;
    this.chanId = normalizeOrbChannelId(def.chanId, def.bandId);
    this.bandIds = sanitizeOrbBandIds(def.bandIds, def.bandNames);
    this.chirality = def.chirality;
    this.startAngleRad = def.startAngleRad;
    this.angleRad = this.startAngleRad;

    this.trail = new TrailSystem();

    this.xSim = 0;
    this.ySim = 0;
    this.baseRadiusPx = 0;
    this.radialDispPx = 0;
  }

  resetPhase() { this.angleRad = this.startAngleRad; }
  resetTrail() { this.trail.reset(); }

  step(dtSec, nowSec, band, energyOverride01) {
    const s = runtime.settings;

    this.angleRad += this.chirality * s.motion.angularSpeedRadPerSec * dtSec;
    this.angleRad = ((this.angleRad % TAU) + TAU) % TAU;

    const minDim = Math.min(state.widthPx, state.heightPx);
    const minR = minDim * s.audio.minRadiusFrac;
    const maxR = minDim * s.audio.maxRadiusFrac;
    const safeMin = Math.min(minR, maxR);
    const safeMax = Math.max(minR, maxR);

    const energy01 = Number.isFinite(energyOverride01)
      ? clamp(energyOverride01, 0, 1)
      : (band ? band.energy01 : 0);
    this.baseRadiusPx = safeMin + (safeMax - safeMin) * energy01;

    const wf = band ? band.timeDomain : null;
    if (wf && wf.length > 0) {
      const phase01 = this.angleRad / TAU;
      const idx = Math.floor(phase01 * (wf.length - 1));
      const sample = wf[idx];
      this.radialDispPx = this.baseRadiusPx * s.motion.waveformRadialDisplaceFrac * sample;
    } else {
      this.radialDispPx = 0;
    }

    const radius = this.baseRadiusPx + this.radialDispPx;

    this.xSim = radius * Math.cos(this.angleRad);
    this.ySim = radius * Math.sin(this.angleRad);

    const rgbStart = ColorPolicy.pickParticleColorRgb01(this.angleRad);
    this.trail.updateAndEmit(dtSec, nowSec, this.xSim, this.ySim, rgbStart);
  }
}

/* =============================================================================
   Renderer
   ========================================================================== */
const Renderer = (() => {
  function clearFrame() {
    const ctx = state.ctx;
    const s = runtime.settings;
    ctx.fillStyle = s.visuals.backgroundColor;
    ctx.fillRect(0, 0, state.widthPx, state.heightPx);
  }

  function drawTrailLines(particles) {
    const s = runtime.settings;
    if (!s.trace.lines) return;

    const segments = s.trace.numLines;
    const neededPts = segments + 1;
    if (!particles || particles.length < 2) return;

    const startIdx = Math.max(0, particles.length - neededPts);
    const slice = particles.slice(startIdx);
    if (slice.length < 2) return;

    const ctx = state.ctx;
    const rgb = ColorPolicy.pickLineColorRgb01(particles);
    const stroke = rgb01ToCss(rgb, s.trace.lineAlpha);

    ctx.save();
    ctx.globalAlpha = 1;
    ctx.strokeStyle = stroke;
    ctx.lineWidth = s.trace.lineWidthPx * state.dpr;
    ctx.lineJoin = "round";
    ctx.lineCap = "round";

    const p0 = Spaces.simToScreen(slice[0].xSim, slice[0].ySim);
    ctx.beginPath();
    ctx.moveTo(p0.x, p0.y);

    for (let i = 1; i < slice.length; i++) {
      const pi = Spaces.simToScreen(slice[i].xSim, slice[i].ySim);
      ctx.lineTo(pi.x, pi.y);
    }
    ctx.stroke();
    ctx.restore();
  }

  function drawParticles(particles, nowSec) {
    const s = runtime.settings;
    const ctx = state.ctx;

    const bg = hexToRgb01(s.visuals.backgroundColor);

    const sizeMax = s.particles.sizeMaxPx * state.dpr;
    const sizeMin = Math.min(s.particles.sizeMinPx, s.particles.sizeMaxPx) * state.dpr;

    const toMin = Math.max(0.0001, s.particles.sizeToMinSec);
    const ttl = Math.max(0.0001, s.particles.ttlSec);
    const fadeSec = Math.max(0.0001, ttl - toMin);

    for (let i = 0; i < particles.length; i++) {
      const p = particles[i];
      const age = nowSec - p.bornSec;

      let size = sizeMin;
      if (age < toMin) {
        const t = clamp(age / toMin, 0, 1);
        size = lerp(sizeMax, sizeMin, t);
      }

      const fg = p.rgbStart || hexToRgb01(s.visuals.particleColor);

      let color = fg;
      if (age >= toMin) {
        const t = clamp((age - toMin) / fadeSec, 0, 1);
        color = lerpRgb01(fg, bg, t);
      }

      const ps = Spaces.simToScreen(p.xSim, p.ySim);
      ctx.fillStyle = rgb01ToCss(color, 1);
      ctx.beginPath();
      ctx.arc(ps.x, ps.y, size, 0, TAU);
      ctx.fill();
    }
  }

  function drawBandOverlay(bandC) {
    const s = runtime.settings;
    const o = s.bands.overlay;
    if (!o.enabled || !bandC) return;

    const ctx = state.ctx;
    const n = s.bands.count;
    const phase = state.bands.ringPhaseRad;

    const wf = bandC.timeDomain;

    const minDim = Math.min(state.widthPx, state.heightPx);
    const minR = minDim * s.audio.minRadiusFrac;
    const maxR = minDim * s.audio.maxRadiusFrac;
    const safeMin = Math.min(minR, maxR);
    const safeMax = Math.max(minR, maxR);

    const pts = new Array(n);

    for (let i = 0; i < n; i++) {
      const angle = phase + (i * TAU / n);
      const e = clamp(state.bands.energies01[i] || 0, 0, 1);
      const baseR = safeMin + (safeMax - safeMin) * e;

      let disp = 0;
      if (wf && wf.length > 0) {
        const phase01 = ((angle % TAU) + TAU) % TAU / TAU;
        const idx = Math.floor(phase01 * (wf.length - 1));
        const sample = wf[idx];
        disp = baseR * s.motion.waveformRadialDisplaceFrac * sample;
      }

      const r = baseR + disp;
      const xSim = r * Math.cos(angle);
      const ySim = r * Math.sin(angle);

      pts[i] = { xSim, ySim };
    }

    if (o.connectAdjacent) {
      ctx.save();
      ctx.lineWidth = o.lineWidthPx * state.dpr;
      ctx.lineJoin = "round";
      ctx.lineCap = "round";

      for (let i = 0; i < n; i++) {
        const j = (i + 1) % n;
        const c = ColorPolicy.bandRgb01(i);
        ctx.strokeStyle = rgb01ToCss(c, o.lineAlpha);

        const a = Spaces.simToScreen(pts[i].xSim, pts[i].ySim);
        const b = Spaces.simToScreen(pts[j].xSim, pts[j].ySim);

        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
      }
      ctx.restore();
    }

    ctx.save();
    const rPx = o.pointSizePx * state.dpr;
    for (let i = 0; i < n; i++) {
      const c = ColorPolicy.bandRgb01(i);
      ctx.fillStyle = rgb01ToCss(c, o.alpha);
      const p = Spaces.simToScreen(pts[i].xSim, pts[i].ySim);
      ctx.beginPath();
      ctx.arc(p.x, p.y, rPx, 0, TAU);
      ctx.fill();
    }
    ctx.restore();
  }

  function renderFrame(nowSec, bandC) {
    clearFrame();
    drawBandOverlay(bandC);
    for (const orb of state.orbs) {
      const particles = orb.trail.particles;
      drawTrailLines(particles);
      drawParticles(particles, nowSec);
    }
  }

  return { renderFrame };
})();

/* =============================================================================
   UI
   ========================================================================== */
const UI = (() => {
  const ui = state.ui;

  function setCssVarsFromConfig() {
    const r = document.documentElement.style;
    r.setProperty("--ui-panel-bg", CONFIG.ui.panelBackgroundRgba);
    r.setProperty("--ui-panel-blur", CONFIG.ui.panelBlurPx + "px");
    r.setProperty("--ui-pad", CONFIG.ui.panelPaddingPx + "px");
    r.setProperty("--ui-gap", CONFIG.ui.panelGapPx + "px");
    r.setProperty("--ui-radius", CONFIG.ui.panelRadiusPx + "px");
    r.setProperty("--ui-audio-h", CONFIG.ui.audioPanelHeightPx + "px");
    r.setProperty("--ui-icon", CONFIG.ui.iconButtonSizePx + "px");
  }

  function bindRange(el, lim) {
    el.min = String(lim.min);
    el.max = String(lim.max);
    el.step = String(lim.step);
  }

  function hideAudioPanel() { ui.audioPanel.style.display = "none"; ui.openAudio.style.display = "block"; }
  function showAudioPanel() { ui.audioPanel.style.display = "grid"; ui.openAudio.style.display = "none"; }

  function hideSimPanel() { ui.simPanel.style.display = "none"; ui.openSim.style.display = "block"; }
  function showSimPanel() { ui.simPanel.style.display = "block"; ui.openSim.style.display = "none"; }

  function hideBandsPanel() { ui.bandsPanel.style.display = "none"; ui.openBands.style.display = "block"; }
  function showBandsPanel() { ui.bandsPanel.style.display = "block"; ui.openBands.style.display = "none"; }

  function togglePanels() {
    const aVisible = ui.audioPanel.style.display !== "none";
    const sVisible = ui.simPanel.style.display !== "none";
    const bVisible = ui.bandsPanel.style.display !== "none";

    if (aVisible || sVisible || bVisible) {
      hideAudioPanel(); hideSimPanel(); hideBandsPanel();
    } else {
      showAudioPanel(); showSimPanel(); showBandsPanel();
    }
  }

  function applyPrefs(reason, options = {}) {
    const { rebuildBandsOnDefinitionChange = false } = options;
    const prevBandDefKey = BandBankController.readBandDefKey(runtime.settings);
    const prevFftSize = runtime.settings.audio.fftSize;

    preferences.particles.sizeMinPx = Math.min(preferences.particles.sizeMinPx, preferences.particles.sizeMaxPx);
    preferences.particles.ttlSec = Math.max(preferences.particles.ttlSec, preferences.particles.sizeToMinSec);

    resolveSettings();

    BandBankController.syncFromSettings();
    const bandDefinitionChanged = BandBankController.readBandDefKey(runtime.settings) !== prevBandDefKey;
    const fftSizeChanged = runtime.settings.audio.fftSize !== prevFftSize;
    const shouldRebuildBands = bandDefinitionChanged && rebuildBandsOnDefinitionChange;
    if (shouldRebuildBands || fftSizeChanged) {
      BandBankController.rebuildNow();
    }

    AudioEngine.applyAnalyserSettingsLive();
    AudioEngine.applyPlaybackSettingsLive();

    ui.simStatus.textContent = reason ? `Updated: ${reason}` : "Sim panel: trace, particles, motion, analysis.";
    ui.bandsStatus.textContent = "Bands panel: colors + spectral HUD.";
  }

  function resetOrbsToDesignedPhases() {
    orbSystem.reset();
    trailSystem.reset();
  }

  function resetPrefs() {
    preferences = deepClone(CONFIG.defaults);
    initOrbs();
    AppActions.onPrefsApplied("prefs reset", {
      rebuildBandsOnDefinitionChange: true,
      resetOrbs: true,
      resetTrails: true,
    });
  }

  async function shareLink() {
    UrlPreset.writeHashFromPrefs();
    const url = location.href;
    try {
      await navigator.clipboard.writeText(url);
      ui.simStatus.textContent = "Share link copied to clipboard.";
    } catch {
      ui.simStatus.textContent = "Share link written to URL (copy from address bar).";
    }
  }

  function applyUrlNow() {
    const ok = UrlPreset.applyFromLocationHash();
    if (ok) {
      initOrbs();
      AppActions.onHashApplied("applied URL preset");
    } else {
      ui.simStatus.textContent = "No valid preset in URL hash.";
    }
  }

  function ensureBandHudBuilt() {
    if (ui.bandRowsBuilt) return;

    ui.bandRowsBuilt = true;
    ui.bandRowEls = [];

    const n = runtime.settings.bands.count;
    ui.bandTable.innerHTML = "";

    for (let i = 0; i < n; i++) {
      const idx = document.createElement("div");
      idx.className = "bandIdx";
      idx.textContent = String(i);

      const name = document.createElement("div");
      name.className = "bandName";
      name.textContent = BAND_NAMES[i] || `Band ${i}`;

      const bar = document.createElement("div");
      bar.className = "bandBar";

      const fill = document.createElement("div");
      fill.className = "bandFill";
      bar.appendChild(fill);

      ui.bandTable.appendChild(idx);
      ui.bandTable.appendChild(name);
      ui.bandTable.appendChild(bar);

      ui.bandRowEls.push({ idx, name, fill });
    }
  }

  function refreshBandHud() {
    ensureBandHudBuilt();

    const s = runtime.settings;
    const n = s.bands.count;

    for (let i = 0; i < n; i++) {
      const e = clamp(state.bands.energies01[i] || 0, 0, 1);
      const pct = Math.round(e * 100);

      const c = ColorPolicy.bandRgb01(i);
      const alpha = 0.80;

      ui.bandRowEls[i].fill.style.width = pct + "%";
      ui.bandRowEls[i].fill.style.background = rgb01ToCss(c, alpha);

      const isDom = i === state.bands.dominantIndex;
      ui.bandRowEls[i].name.style.opacity = isDom ? "1.0" : "0.75";
      ui.bandRowEls[i].idx.style.opacity = isDom ? "1.0" : "0.65";
    }

    const domName = state.bands.dominantName || "(none)";
    const domHz = state.bands.dominantHz || "";
    ui.bandDebug.innerHTML = `<span class="dominantBadge">Dominant: [${state.bands.dominantIndex}] ${domName} ${domHz ? "— " + domHz : ""}</span>`;
  }

  function formatBandMetaHz(hz) {
    if (!Number.isFinite(hz)) return "n/a";
    if (hz >= 1000) return `${fmt(hz / 1000, 2)} kHz`;
    return `${fmt(hz, 1)} Hz`;
  }

/* =============================================================================
   Boot / loop
   ========================================================================== */
function initOrbs() {
  state.orbs.length = 0;
  for (const def of runtime.settings.orbs) state.orbs.push(new Orb(def));
}

const trailSystem = {
  reset() {
    for (const orb of state.orbs) orb.resetTrail();
  },
};

const orbSystem = {
  reset() {
    for (const orb of state.orbs) orb.resetPhase();
    state.bands.ringPhaseRad = state.orbs.length ? state.orbs[0].angleRad : 0;
  },
};

const AppActions = {
  onAudioLoaded() {
    UI.applyPrefs("audio loaded");
    // Policy: keep designed phase continuity, clear accumulated trail history.
    trailSystem.reset();
  },

  onPrefsApplied(reason, options = {}) {
    const {
      rebuildBandsOnDefinitionChange = false,
      resetOrbs = false,
      resetTrails = false,
    } = options;

    UI.applyPrefs(reason, { rebuildBandsOnDefinitionChange });
    if (resetOrbs) orbSystem.reset();
    if (resetTrails) trailSystem.reset();
  },

  onHashApplied(reason) {
    // Policy: hash-applied presets are a fresh sim baseline.
    AppActions.onPrefsApplied(reason, {
      rebuildBandsOnDefinitionChange: true,
      resetOrbs: true,
      resetTrails: true,
    });
  },

  onStop() {
    AudioEngine.stop();
    // Policy: transport stop rewinds audio only; simulation continuity is preserved.
  },
};

function getBandForOrb(orb, snapshot) {
  const channel = normalizeOrbChannelId(orb && orb.chanId, orb && orb.bandId);
  const sourceBand = channel === "L"
    ? snapshot.bands.L
    : (channel === "R" ? snapshot.bands.R : snapshot.bands.C);

  const bandIds = Array.isArray(orb && orb.bandIds) ? orb.bandIds : [];
  if (!bandIds.length) return { band: sourceBand, energyOverride01: null };

  const energies = state.bands.energies01;
  if (!Array.isArray(energies) || !energies.length) return { band: sourceBand, energyOverride01: null };

  let sum = 0;
  for (const idx of bandIds) sum += energies[idx] || 0;
  const avg = sum / bandIds.length;

  return { band: sourceBand, energyOverride01: clamp(avg, 0, 1) };
}

let lastBandSnapshot = null;

function onAnimationFrame(tsMs) {
  requestAnimationFrame(onAnimationFrame);

  resizeCanvasToDisplaySize();

  if (state.time.lastTimestampMs === null) {
    state.time.lastTimestampMs = tsMs;
    return;
  }

  const dtSecRaw = (tsMs - state.time.lastTimestampMs) / 1000;
  state.time.lastTimestampMs = tsMs;

  // Integrate with real frame time, but cap to a single "slow frame" (~33 ms)
  // so tab-switch or GC spikes can't cause huge jumps. Normal 60/120 Hz frames
  // stay untouched, lower bound remains 0, and downstream emit overflow guards stay valid.
  const dtSec = clamp(dtSecRaw, 0, runtime.settings.timing.maxDeltaTimeSec);
  const nowSec = performance.now() / 1000;

  lastBandSnapshot = AudioEngine.sample();
  const bandC = (lastBandSnapshot && lastBandSnapshot.ready) ? lastBandSnapshot.bands.C : null;

  // Ring phase:
  // - orb: lock to carrier orb angle (coherent)
  // - free: integrate a ring angular velocity independent of the orb
  const o = runtime.settings.bands.overlay;
  if (o.phaseMode === "orb") {
    state.bands.ringPhaseRad = (state.orbs.length ? state.orbs[0].angleRad : state.bands.ringPhaseRad);
  } else {
    state.bands.ringPhaseRad = ((state.bands.ringPhaseRad + o.ringSpeedRadPerSec * dtSec) % TAU + TAU) % TAU;
  }

  if (!state.time.simPaused) {
    for (const orb of state.orbs) {
      const selection = (lastBandSnapshot && lastBandSnapshot.ready)
        ? getBandForOrb(orb, lastBandSnapshot)
        : null;
      const orbBand = selection ? selection.band : null;
      const energyOverride01 = selection ? selection.energyOverride01 : null;
      orb.step(dtSec, nowSec, orbBand, energyOverride01);
    }
  }

  Renderer.renderFrame(nowSec, bandC);
  UI.refreshAllUiText(lastBandSnapshot);
}

function main() {
  UI.setCssVarsFromConfig();

  state.canvas = document.getElementById("c");
  state.ctx = state.canvas.getContext("2d", { alpha: false });

  resolveSettings();
  UrlPreset.applyFromLocationHash();
  resolveSettings();

  BandBankController.syncFromSettings();
  BandBankController.rebuildNow();
  initOrbs();

  UI.wireControls();
  UI.applyPrefs("boot");

  resizeCanvasToDisplaySize();
  window.addEventListener("resize", resizeCanvasToDisplaySize);

  requestAnimationFrame(onAnimationFrame);
}

main();
</script>
